name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CONFIGURATION: Debug
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_NOLOGO: "true"
  PROJECT_FILE: Mystral.csproj
  TEST_PROJECT: tests/Mystral.Tests/Mystral.Tests.csproj

jobs:
  test:
    name: Build and test
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore $env:TEST_PROJECT

      - name: Build app
        run: >
          dotnet build $env:PROJECT_FILE
          -c $env:CONFIGURATION
          --no-restore
          -p:AppEnvironment=Development
          -p:ContinuousIntegrationBuild=true

      - name: Build tests
        run: >
          dotnet build $env:TEST_PROJECT
          -c $env:CONFIGURATION
          --no-restore
          -p:ContinuousIntegrationBuild=true

      - name: Run tests
        run: >
          dotnet run
          --project $env:TEST_PROJECT
          -c $env:CONFIGURATION
          --no-build
